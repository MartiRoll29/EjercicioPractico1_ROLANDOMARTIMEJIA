<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categorias')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <h2>Categorias de Entrenamiento</h2>
        <p><a th:href="@{/categorias/nueva}" class="btn btn-primary">+ Nueva categoria</a></p>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="categoria : ${categorias}">
                    <td th:text="${categoria.id}"></td>
                    <td th:text="${categoria.nombre}"></td>
                    <td>
                        <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}" class="btn btn-secondary">Editar</a>
                        <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}" class="btn btn-danger"
                           onclick="return confirm('¿Eliminar esta categoria?');">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
