<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contacto')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <h2>Contactanos</h2>

        <div class="alert-success" th:if="${enviado}">
            Gracias por escribirnos. Te contactaremos pronto.
        </div>

        <form th:action="@{/contacto/enviar}" th:object="${contacto}" method="post">
            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>
            </div>
            <div class="campo">
                <label for="correo">Correo electronico</label>
                <input type="email" id="correo" th:field="*{correo}" required>
            </div>
            <div class="campo">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" th:field="*{mensaje}" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar mensaje</button>
        </form>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
