<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clase')}"></head>
<body>
    <header th:replace="~{fragments/layout :: header}"></header>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container">
        <h2 th:text="${clase.id} == null ? 'Nueva clase' : 'Editar clase'"></h2>

        <form th:action="@{/clases/guardar}" th:object="${clase}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" th:field="*{nombre}">
                <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
            </div>
            <div class="campo">
                <label for="precio">Precio</label>
                <input type="number" step="0.01" id="precio" th:field="*{precio}">
                <span class="error" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></span>
            </div>
            <div class="campo">
                <label for="categoria">Categoria</label>
                <select id="categoria" th:field="*{categoria}">
                    <option value="">-- Seleccione --</option>
                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></span>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/clases}" class="btn btn-secondary">Cancelar</a>
        </form>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
